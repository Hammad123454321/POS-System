<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="x-ua-compatible" content="ie=edge">

    <title>POSLink Demo</title>


    <script src="js/console-log.js"  type="text/javascript"></script>
    <script src="js/js-bridge.js"  type="text/javascript"></script>
    <link rel="stylesheet" href="css/libs/bootstrap.min.4.0.0.css" type="text/css" />
    <link rel="stylesheet" href="css/home.css" type="text/css" />
</head>

<body>

    <nav class="navbar navbar-expand-md navbar-dark fixed-top bg-dark">
        <a class="navbar-brand" href="#payment">Home</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarCollapse" aria-controls="navbarCollapse"
            aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarCollapse">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item active">
                    <a class="nav-link" href="#payment">Payment</a>
                </li>
                <li class="nav-item active">
                    <a class="nav-link" href="#manage">Manage</a>
                </li>
                <li class="nav-item active">
                    <a class="nav-link" href="#batch">Batch</a>
                </li>
                <li class="nav-item active">
                    <a class="nav-link" href="#report">Report</a>
                </li>
                <li class="nav-item active">
                    <a class="nav-link" href="#setting">Setting</a>
                </li>
            </ul>
        </div>
    </nav>

    <div style="padding-top:4em; display:block"></div>

    <main role="main" class="container">

        <a class="anchor" id="payment"></a>
        <br/>
        <div class="fragment-container">
            <h4 class="fragment-title card-header">Payment</h4>
            <div class="fragment-body card-body">
                <div class="left-half">
                    <div id="payment_req" class="items-center">
                        <p style="text-align:center;">Request</p>
                    </div>
                </div>
                <div class="right-half">
                    <div id="payment_resp" class="items-center">
                        <p style="text-align:center;">Response</p>
                    </div>
                </div>
                <div class="btn-start-poslink_wrapper ">
                    <button id="start_payment" type="submit" class="btn-start-poslink btn btn-large">Start</button>
                </div>
            </div>
        </div>


        <a class="anchor" id="manage"></a>
        <br/>
        <div class="fragment-container">
            <h4 class="fragment-title  card-header">Manage</h4>
            <div class="fragment-body card-body">
                <div class="left-half">
                    <div id="manage_req" class="items-center">
                        <p style="text-align:center;">Request</p>
                    </div>
                </div>
                <div class="right-half">
                    <div id="manage_resp" class="items-center">
                        <p style="text-align:center;">Response</p>
                    </div>
                </div>
                <div class="btn-start-poslink_wrapper ">
                    <button id="start_manage" type="submit" class="btn-start-poslink btn btn-large">Start</button>
                </div>
            </div>
        </div>

        <a class="anchor" id="batch"></a>
        <br/>
        <div class="fragment-container">
            <h4 class="fragment-title  card-header">Batch</h4>
            <div class="fragment-body card-body">
                <div class="left-half">
                    <div id="batch_req" class="items-center">
                        <p style="text-align:center;">Request</p>
                    </div>
                </div>
                <div class="right-half">
                    <div id="batch_resp" class="items-center">
                        <p style="text-align:center;">Response</p>
                    </div>
                </div>
                <div class="btn-start-poslink_wrapper ">
                    <button id="start_batch" type="submit" class="btn-start-poslink btn btn-large">Start</button>
                </div>
            </div>
        </div>

        <a class="anchor" id="report"></a>
        <br/>
        <div class="fragment-container">
            <h4 class="fragment-title  card-header">Report</h4>
            <div class="fragment-body card-body">
                <div class="left-half">
                    <div id="report_req" class="items-center">
                        <p style="text-align:center;">Request</p>
                    </div>
                </div>
                <div class="right-half">
                    <div id="report_resp" class="items-center">
                        <p style="text-align:center;">Response</p>
                    </div>
                </div>
                <div class="btn-start-poslink_wrapper ">
                    <button id="start_report" type="submit" class="btn-start-poslink btn btn-large">Start</button>
                </div>
            </div>
        </div>

        <a class="anchor" id="setting"></a>
        <br/>
        <div class="fragment-container">
            <h4 class="fragment-title card-header">Setting</h4>
            <div class="fragment-body card-body">
                <div class="left-half">
                    <h4 class="fragment-title">CommSetting</h4>
                    <div id="comm_setting" class="items-center">
                    </div>
                </div>
                <div class="right-half">
                    <h4 class="fragment-title">LogSetting</h4>
                    <div id="log_setting" class="items-center">
                    </div>
                </div>
            </div>
            <div class="fragment-body">
                <div class="btn-start-poslink_wrapper half-btn-container">
                    <button id="start_comm_setting" type="submit" class="btn-start-poslink btn btn-large">Start</button>
                </div>
                <div class="btn-start-poslink_wrapper half-btn-container">
                    <button id="start_log_setting" type="submit" class="btn-start-poslink btn btn-large">Start</button>
                </div>
            </div>
        </div>

    </main>


    <script src="js/libs/jquery.min.3.3.1.js" type="text/javascript"></script>
    <script src="js/libs/bootstrap.min.4.0.0.js" type="text/javascript"></script>
    <script src="js/libs/require.min.2.3.5.js" data-main="js/home" type="text/javascript"></script>
</body>

</html>
