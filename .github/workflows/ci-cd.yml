name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Laravel)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: pos_platform
          POSTGRES_USER: pos_app
          POSTGRES_PASSWORD: pos_app
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U pos_app -d pos_platform"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: apps/platform

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, pgsql, redis, intl, mbstring, zip, bcmath
          coverage: none
          tools: composer:v2

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/platform/package-lock.json

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: apps/platform/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('apps/platform/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Composer install
        run: composer install --no-interaction --prefer-dist --no-progress --no-scripts

      - name: NPM install
        run: npm ci

      - name: Build front-end assets
        run: npm run build

      - name: Code style (Pint)
        run: vendor/bin/pint --test

      - name: Run tests
        continue-on-error: true
        env:
          APP_ENV: testing
          DB_CONNECTION: pgsql
          DB_HOST: localhost
          DB_PORT: 5432
          DB_DATABASE: pos_platform
          DB_USERNAME: pos_app
          DB_PASSWORD: pos_app
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
        run: php artisan test

  deploy:
    name: Deploy to VPS
    needs: [backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://app.zendev.us

    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /srv/pos-platform
            ./infra/deploy.sh

      - name: Smoke check
        run: |
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" https://app.zendev.us)
            echo "Attempt $i: HTTP $code"
            if [ "$code" = "200" ] || [ "$code" = "302" ]; then exit 0; fi
            sleep 5
          done
          exit 1
