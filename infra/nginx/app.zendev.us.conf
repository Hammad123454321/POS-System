# Host nginx site for app.zendev.us.
#
# Ship as HTTP-only. After running `certbot --nginx -d app.zendev.us --redirect`
# certbot rewrites this file in place: adds an SSL server block on :443 and
# converts this :80 block into a permanent redirect to HTTPS.
#
# The app itself runs inside Docker on 127.0.0.1:8000 (loopback only) — nginx
# is the only thing the public internet ever reaches.

server {
    listen 80;
    listen [::]:80;
    server_name app.zendev.us;

    # Upload ceiling — Laravel handles POST bodies up to this size.
    client_max_body_size 25m;

    # Long timeouts for slow first requests (e.g. cold cache warm-up).
    proxy_connect_timeout 30s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        # WebSocket / Inertia keep-alive support.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
